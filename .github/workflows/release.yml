name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-extract ZIP files
        run: |
          shopt -s nullglob
          for zip in *.zip; do
            echo "📦 Extracting $zip ..."
            unzip -o "$zip"
          done
          ls -la

      - name: Locate Gradle project
        id: find
        run: |
          SETTINGS=$(find . -maxdepth 4 -type f \
            \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
            -not -path "./.git/*" 2>/dev/null | head -n1)
          if [ -z "$SETTINGS" ]; then
            echo "::error::settings.gradle(.kts) not found."
            exit 1
          fi
          ROOT=$(dirname "$SETTINGS")
          ROOT="${ROOT#./}"
          [ -z "$ROOT" ] && ROOT="."
          echo "✅ Gradle project root: '$ROOT'"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          if [ "$ROOT" = "." ]; then
            echo "prefix=" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=$ROOT/" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
          build-root-directory: ${{ steps.find.outputs.root }}

      - name: Generate Gradle wrapper if missing
        working-directory: ${{ steps.find.outputs.root }}
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Decode signing keystore (optional)
        id: keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/release.keystore
          echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Build release APK (signed)
        if: ${{ steps.keystore.outputs.path != '' }}
        working-directory: ${{ steps.find.outputs.root }}
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        if: ${{ steps.keystore.outputs.path == '' }}
        working-directory: ${{ steps.find.outputs.root }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK with version tag
        id: rename
        working-directory: ${{ steps.find.outputs.root }}
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          SRC=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          DST="app/build/outputs/apk/release/NoteApp-${TAG}.apk"
          cp "$SRC" "$DST"
          echo "apk=${{ steps.find.outputs.prefix }}$DST" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteApp-release-${{ steps.rename.outputs.tag }}
          path: ${{ steps.rename.outputs.apk }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          generate_release_notes: true
          draft: false
          prerelease: false
