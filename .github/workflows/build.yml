name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ZIPファイルがリポジトリに置かれていたら自動展開する
      # （ZIPを展開し忘れてpushしても動くようにするための保険）
      - name: Auto-extract ZIP files
        run: |
          shopt -s nullglob
          for zip in *.zip; do
            echo "📦 Extracting $zip ..."
            unzip -o "$zip"
          done
          echo ""
          echo "=== Contents after extract ==="
          ls -la

      # Gradleプロジェクト(settings.gradle.kts があるディレクトリ)を探す
      - name: Locate Gradle project
        id: find
        run: |
          SETTINGS=$(find . -maxdepth 4 -type f \
            \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
            -not -path "./.git/*" 2>/dev/null | head -n1)
          if [ -z "$SETTINGS" ]; then
            echo "::error::settings.gradle(.kts) not found anywhere in the repository."
            exit 1
          fi
          ROOT=$(dirname "$SETTINGS")
          ROOT="${ROOT#./}"
          [ -z "$ROOT" ] && ROOT="."
          echo "✅ Gradle project root: '$ROOT'"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          if [ "$ROOT" = "." ]; then
            echo "prefix=" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=$ROOT/" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
          build-root-directory: ${{ steps.find.outputs.root }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate Gradle wrapper if missing
        working-directory: ${{ steps.find.outputs.root }}
        run: |
          if [ ! -f gradlew ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Lint
        working-directory: ${{ steps.find.outputs.root }}
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Build debug APK
        working-directory: ${{ steps.find.outputs.root }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoteApp-debug
          path: ${{ steps.find.outputs.prefix }}app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: ${{ steps.find.outputs.prefix }}app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7
