name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# 同じブランチで新しいpushが来たら古い実行をキャンセル
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Gradle を provisioning。gradle-version を指定することで
      # プロジェクトに wrapper が無くても `gradle` コマンドが使える。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # 初回ビルド時に wrapper が無ければ生成する（2回目以降はキャッシュされた
      # リポジトリに gradlew がコミットされていればスキップ）
      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Lint
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoteApp-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7
